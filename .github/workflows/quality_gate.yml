name: Quality Gate

on:
  push:
  pull_request:

jobs:
  quality_gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Preparar reporte pip_audit
        run: |
          mkdir -p docs
          : > docs/pip_audit_report.txt

      - name: Instalar dependencias base
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Instalar dependencias de desarrollo
        run: |
          python -m pip install -r requirements-dev.txt

      - name: Verificar import de pip_audit
        run: |
          python -c "import pip_audit; print('pip_audit_ok')"

      - name: Ejecutar gate PR
        run: |
          python -m scripts.gate_pr

      - name: Subir artefacto de pip_audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: docs/pip_audit_report.txt
          if-no-files-found: warn
