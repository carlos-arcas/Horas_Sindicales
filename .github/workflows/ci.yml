name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  core:
    name: core
    runs-on: ubuntu-latest
    env:
      QUALITY_GATE_STRICT: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Verificar dependencias de calidad
        run: |
          python -c "import pytest_cov" || (echo "ERROR: Falta pytest-cov. Instala requirements-dev.txt" && exit 1)
          python -c "import radon" || (echo "ERROR: Falta radon. Instala requirements-dev.txt" && exit 1)

      - name: Lint
        run: ruff check .

      - name: Typecheck
        run: python scripts/typecheck.py

      - name: Verificación de sintaxis (compileall)
        run: python -m compileall -q app scripts tests

      - name: Secret scanning por contenido
        run: pytest -q -m "not ui" tests/test_no_secrets_content_scan.py

      - name: Tests CORE + coverage (sin UI)
        run: |
          COVERAGE_FAIL_UNDER=$(python -c "import json; d=json.load(open('.config/quality_gate.json', encoding='utf-8')); print(d.get('coverage_fail_under_core', d['coverage_fail_under']))")
          COVERAGE_TARGETS=$(python -c "import json; d=json.load(open('.config/quality_gate.json', encoding='utf-8')); print(' '.join(f'--cov={x}' for x in d.get('core_coverage_targets', ['app'])))")
          pytest -q -m "not ui" ${COVERAGE_TARGETS} --cov-report=term-missing --cov-fail-under=${COVERAGE_FAIL_UNDER}

      - name: Reporte de calidad (LOC/CC/Coverage por paquete)
        run: |
          python scripts/report_quality.py --out logs/quality_report.txt

      - name: Enforce CC target budgets
        run: |
          python scripts/report_quality.py --enforce-config-targets --out logs/quality_report.txt

      - name: Quality Gate unificado (reportes MD/JSON)
        run: |
          python -m scripts.quality_gate
          python scripts/quality_summary.py

      - name: Subir artefacto de calidad
        uses: actions/upload-artifact@v4
        with:
          # Contrato histórico de artefacto: quality-gate-report-py${{ matrix.python-version }}
          name: quality-gate-report
          path: |
            logs/quality_report.md
            logs/quality_report.json
            logs/quality_report.txt
            logs/coverage.json

  ui_smoke:
    name: ui_smoke
    runs-on: ubuntu-latest
    env:
      QUALITY_GATE_STRICT: '1'
      CI: 'true'
      HORAS_UI_SMOKE_CI: '1'
      QT_QPA_PLATFORM: offscreen
      QT_OPENGL: software
      LIBGL_ALWAYS_SOFTWARE: '1'
      HORAS_UI_SMOKE_EVIDENCE_DIR: artifacts/ui_smoke_evidencias
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Qt/Linux system dependencies
        run: |
          sudo apt-get update
          PAQUETES_QT="xvfb libgl1 libegl1 libgl1-mesa-dri libxkbcommon-x11-0"
          for paquete_opcional in libegl1-mesa libegl-mesa0; do
            if apt-cache show "$paquete_opcional" >/dev/null 2>&1; then
              PAQUETES_QT="$PAQUETES_QT $paquete_opcional"
            fi
          done
          sudo apt-get install -y --no-install-recommends $PAQUETES_QT

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ui smoke job)
        run: ruff check .

      - name: Qt import smoke check
        run: |
          python -c "from PySide6.QtWidgets import QApplication, QCheckBox; print('qt_ok')"

      - name: UI smoke tests (headless via xvfb)
        run: |
          mkdir -p artifacts/ui_smoke_evidencias
          xvfb-run -a pytest -q tests/ui/test_confirmar_pdf_mainwindow_smoke.py -rA | tee artifacts/ui_smoke_pytest.log

      - name: Subir artefactos UI smoke
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-evidencia-confirmar-pdf
          path: |
            artifacts/ui_smoke_evidencias/*.json
            artifacts/ui_smoke_pytest.log
